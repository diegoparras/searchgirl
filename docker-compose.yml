# Searchgirl standalone: la app + su SearXNG interno.
#
#   docker compose up -d --build
#   http://localhost:8089            → UI web (y /api, /mcp)
#
# SearXNG NO publica puerto: solo Searchgirl lo alcanza por la red interna.

name: searchgirl

services:
  searchgirl:
    build: .
    image: ghcr.io/diegoparras/searchgirl:latest
    container_name: searchgirl
    # host.docker.internal también en Linux (en Docker Desktop ya existe):
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Publicado SOLO en tu máquina por defecto. Para exponerlo en la red
    # (LAN/VPS), poné auth (SEARCHGIRL_USER/PASS o token) y en el .env:
    #   SEARCHGIRL_BIND=0.0.0.0
    ports:
      - "${SEARCHGIRL_BIND:-127.0.0.1}:8089:8080"
    environment:
      SEARXNG_URL: http://searxng:8080
      SEARCHGIRL_DEFAULT_LANGUAGE: ${SEARCHGIRL_DEFAULT_LANGUAGE:-es}
      # Login local opcional (pantalla de entrada estándar Escriba). Sin esto,
      # la app abre sin login. Definilos en un .env junto a este compose:
      #   SEARCHGIRL_USER=diego
      #   SEARCHGIRL_PASS=una-clave-larga
      SEARCHGIRL_USER: ${SEARCHGIRL_USER:-}
      SEARCHGIRL_PASS: ${SEARCHGIRL_PASS:-}
      SECRET_KEY: ${SECRET_KEY:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      # Tokens Bearer para agentes: varios con nombre, separados por coma
      # (ej. "claude:abc...,n8n:def..."). Revocar uno = sacarlo y reiniciar.
      SEARCHGIRL_MCP_TOKEN: ${SEARCHGIRL_MCP_TOKEN:-}
      # Detrás de un reverse proxy: sus IPs/CIDRs para que el rate limit use
      # la IP real del cliente (X-Forwarded-For). Ej: 172.16.0.0/12
      SEARCHGIRL_TRUSTED_PROXIES: ${SEARCHGIRL_TRUSTED_PROXIES:-}
      SEARCHGIRL_RATE_RPS: ${SEARCHGIRL_RATE_RPS:-}
      SEARCHGIRL_RATE_BURST: ${SEARCHGIRL_RATE_BURST:-}
      # Dentro del contenedor el bind :8080 nunca es loopback; la exposición
      # real la decide el mapeo de ports de arriba (127.0.0.1 por defecto).
      # Por eso acá el fail-safe del binario se relaja: la puerta la maneja
      # Docker, no el bind interno.
      SEARCHGIRL_ALLOW_INSECURE: "1"
      # LLM opcional (modo Respuesta IA). Sin esto, Searchgirl funciona igual.
      #   ANTHROPIC_API_KEY / ANTHROPIC_MODEL          → proveedor Anthropic
      #   LLM_BASE_URL / LLM_MODEL / LLM_API_KEY       → Ollama, OpenRouter, DeepSeek…
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      searxng:
        condition: service_healthy
    restart: unless-stopped

  searxng:
    image: ghcr.io/searxng/searxng:latest
    container_name: searchgirl-searxng
    volumes:
      - ./searxng:/etc/searxng:ro
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-searchgirl-dev-secret}
    # Descomentá SOLO si querés usar el MCP por stdio desde el host
    # (el binario local necesita alcanzar SearXNG):
    # ports:
    #   - "127.0.0.1:8090:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped
